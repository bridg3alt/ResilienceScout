<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="820" height="400" fill="#fcfcfb"/>
  <rect x="0.5" y="0.5" width="819" height="399" fill="none" stroke="#e1e0d9"/>

  <text x="40" y="34" font-size="12" font-weight="600" letter-spacing="1.2" fill="#898781">CERI — SAME FACILITY, 3 cm APART</text>

  <!-- ================= gauge 1 : 76 ================= -->
  <g fill="none" stroke-width="26" stroke-linecap="butt">
    <path d="M70 240 A140 140 0 0 1 127.71 126.74" stroke="#d03b3b"/>
    <path d="M127.71 126.74 A140 140 0 0 1 210 100" stroke="#ec835a"/>
    <path d="M210 100 A140 140 0 0 1 309.00 141.00" stroke="#fab219"/>
    <path d="M309.00 141.00 A140 140 0 0 1 350 240" stroke="#0ca30c"/>
  </g>
  <line x1="300.4" y1="155.1" x2="323.7" y2="133.2" stroke="#fcfcfb" stroke-width="7" stroke-linecap="round"/>
  <line x1="300.4" y1="155.1" x2="323.7" y2="133.2" stroke="#0b0b0b" stroke-width="3.5" stroke-linecap="round"/>
  <text x="210" y="226" text-anchor="middle" font-size="54" font-weight="700" fill="#0b0b0b">76</text>
  <text x="210" y="254" text-anchor="middle" font-size="15" font-weight="600" fill="#0ca30c">Resilient</text>
  <text x="210" y="292" text-anchor="middle" font-size="13" fill="#0b0b0b">0.82 m inundation</text>
  <text x="210" y="312" text-anchor="middle" font-size="12" fill="#52514e">14.0 h sustainable operation</text>

  <!-- ================= gauge 2 : 16 ================= -->
  <g fill="none" stroke-width="26" stroke-linecap="butt">
    <path d="M470 240 A140 140 0 0 1 527.71 126.74" stroke="#d03b3b"/>
    <path d="M527.71 126.74 A140 140 0 0 1 610 100" stroke="#ec835a"/>
    <path d="M610 100 A140 140 0 0 1 709.00 141.00" stroke="#fab219"/>
    <path d="M709.00 141.00 A140 140 0 0 1 750 240" stroke="#0ca30c"/>
  </g>
  <line x1="501.3" y1="180.3" x2="473.3" y2="164.8" stroke="#fcfcfb" stroke-width="7" stroke-linecap="round"/>
  <line x1="501.3" y1="180.3" x2="473.3" y2="164.8" stroke="#0b0b0b" stroke-width="3.5" stroke-linecap="round"/>
  <text x="610" y="226" text-anchor="middle" font-size="54" font-weight="700" fill="#0b0b0b">16</text>
  <text x="610" y="254" text-anchor="middle" font-size="15" font-weight="600" fill="#d03b3b">Critical</text>
  <text x="610" y="292" text-anchor="middle" font-size="13" fill="#0b0b0b">0.85 m inundation</text>
  <text x="610" y="312" text-anchor="middle" font-size="12" fill="#52514e">0.0 h sustainable operation</text>

  <!-- band legend : colour never carries meaning alone -->
  <g font-size="12" fill="#0b0b0b">
    <rect x="126" y="352" width="12" height="12" rx="3" fill="#d03b3b"/>
    <text x="145" y="362">Critical &lt;30</text>
    <rect x="246" y="352" width="12" height="12" rx="3" fill="#ec835a"/>
    <text x="265" y="362">At risk ≥30</text>
    <rect x="374" y="352" width="12" height="12" rx="3" fill="#fab219"/>
    <text x="393" y="362">Moderate ≥50</text>
    <rect x="516" y="352" width="12" height="12" rx="3" fill="#0ca30c"/>
    <text x="535" y="362">Resilient ≥75</text>
  </g>
  <text x="40" y="390" font-size="11.5" fill="#52514e">The scalar is for triage and ordering. A low score is always attributable to one of four inspectable sub-scores.</text>
</svg>

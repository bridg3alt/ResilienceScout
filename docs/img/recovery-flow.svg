<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="900" height="470" fill="#fcfcfb"/>
  <rect x="0.5" y="0.5" width="899" height="469" fill="none" stroke="#e1e0d9"/>

  <text x="30" y="30" font-size="12" font-weight="600" letter-spacing="1.2" fill="#898781">RECOVERY PRIORITIZATION — 1.2 m INUNDATION</text>
  <text x="30" y="52" font-size="11.5" fill="#52514e">Illustrative. Repair hours are placeholder estimates, not surveyed values. What is exact is which set is minimal.</text>

  <text x="212" y="80" font-size="11.5" font-weight="600" fill="#898781" text-anchor="end">FAILED ASSETS</text>
  <text x="656" y="80" font-size="11.5" font-weight="600" fill="#898781">OUTCOME</text>

  <!-- ribbons (drawn under the bars) -->
  <g opacity="0.32">
    <path d="M212 90 C 400 90 440 90 620 90 L620 136 C 440 136 400 136 212 136 Z" fill="#2a78d6"/>
    <path d="M212 148 C 400 148 440 160 620 160 L620 198 C 440 198 400 186 212 186 Z" fill="#898781"/>
    <path d="M212 198 C 400 198 440 198 620 198 L620 229 C 440 229 400 229 212 229 Z" fill="#898781"/>
    <path d="M212 241 C 400 241 440 229 620 229 L620 414 C 440 414 400 426 212 426 Z" fill="#898781"/>
  </g>

  <!-- left bars -->
  <rect x="188" y="90"  width="24" height="46"  rx="3" fill="#2a78d6"/>
  <rect x="188" y="148" width="24" height="38"  rx="3" fill="#898781"/>
  <rect x="188" y="198" width="24" height="31"  rx="3" fill="#898781"/>
  <rect x="188" y="241" width="24" height="185" rx="3" fill="#898781"/>

  <!-- left labels -->
  <g font-size="13" fill="#0b0b0b" text-anchor="end">
    <text x="176" y="109">Generator</text>
    <text x="176" y="127" font-size="11.5" fill="#52514e">12 h</text>
    <text x="176" y="164">Battery</text>
    <text x="176" y="181" font-size="11.5" fill="#52514e">10 h</text>
    <text x="176" y="211">Road access</text>
    <text x="176" y="228" font-size="11.5" fill="#52514e">8 h</text>
    <text x="176" y="330">Transformer</text>
    <text x="176" y="348" font-size="11.5" fill="#52514e">48 h</text>
  </g>

  <!-- right bars -->
  <rect x="620" y="90"  width="24" height="46"  rx="3" fill="#2a78d6"/>
  <rect x="620" y="160" width="24" height="254" rx="3" fill="#898781"/>

  <!-- right labels -->
  <g font-size="13" fill="#0b0b0b">
    <text x="656" y="106" font-weight="700">Minimum repair set</text>
    <text x="656" y="124" font-size="11.5" fill="#52514e">restores adequate power — 12 h</text>
    <text x="656" y="272" font-weight="700">Deferred</text>
    <text x="656" y="290" font-size="11.5" fill="#52514e">66 h of work that does not</text>
    <text x="656" y="307" font-size="11.5" fill="#52514e">change whether the facility runs</text>
  </g>

  <line x1="30" y1="440" x2="870" y2="440" stroke="#e1e0d9"/>
  <text x="30" y="460" font-size="13" fill="#0b0b0b"><tspan font-weight="700">12 hours of work rather than 78</tspan>, for the same restored service. No smaller set restores adequate power.</text>
</svg>
